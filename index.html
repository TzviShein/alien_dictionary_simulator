<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Alien Dictionary Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e7f6e7;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(255,255,255,0.9) 0 2px, transparent 3px),
                radial-gradient(circle at 86% 12%, rgba(207,255,214,0.8) 0 1.5px, transparent 3px),
                radial-gradient(circle at 72% 80%, rgba(168,255,188,0.7) 0 1.5px, transparent 3px),
                linear-gradient(180deg, #edfdf0 0%, #dff8e3 42%, #cdeecd 100%);
            color: #17381c;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle at 15% 18%, rgba(86, 180, 101, 0.16) 0 120px, transparent 180px),
                radial-gradient(circle at 78% 22%, rgba(77, 196, 113, 0.14) 0 130px, transparent 190px),
                radial-gradient(circle at 32% 82%, rgba(145, 224, 128, 0.11) 0 120px, transparent 180px),
                linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0));
            background-size: cover;
            opacity: 1;
        }

        .page-background {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .page-background .backdrop-grid {
            position: absolute;
            inset: -10%;
            background-image:
                radial-gradient(circle, rgba(232, 255, 234, 0.95) 0 1px, transparent 1.8px),
                radial-gradient(circle, rgba(153, 230, 170, 0.7) 0 1.2px, transparent 2px);
            background-size: 64px 64px, 112px 112px;
            opacity: 0.55;
            animation: pageDrift 42s linear infinite;
        }

        .floating-figure {
            position: absolute;
            width: 210px;
            height: 210px;
            opacity: 0.22;
            filter: drop-shadow(0 14px 26px rgba(20, 70, 30, 0.18));
            transform-origin: center;
            animation: floatFigure 10s ease-in-out infinite;
        }

        .floating-figure svg {
            position: static;
            width: 100%;
            height: 100%;
        }

        .floating-figure img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .floating-figure.spock { left: 2%; top: 6%; animation-delay: -1.2s; }
        .floating-figure.spock.alt { left: 78%; top: 68%; width: 180px; height: 180px; animation-delay: -4.4s; }
        .floating-figure.stitch { left: 72%; top: 8%; width: 240px; height: 240px; animation-delay: -2.8s; }
        .floating-figure.stitch.alt { left: 10%; top: 62%; width: 190px; height: 190px; animation-delay: -5.1s; }
        .floating-figure.alien { left: 40%; top: 74%; width: 170px; height: 170px; animation-delay: -3.7s; }
        .floating-figure.alien.alt { left: 48%; top: 8%; width: 150px; height: 150px; animation-delay: -6.2s; }

        .floating-figure .shine {
            animation: softBlink 4s ease-in-out infinite;
        }

        @keyframes pageDrift {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(0, 36px, 0); }
        }

        @keyframes floatFigure {
            0%, 100% { transform: translateY(0px) rotate(-3deg) scale(1); }
            50% { transform: translateY(-18px) rotate(3deg) scale(1.04); }
        }

        @keyframes softBlink {
            0%, 100% { opacity: 0.65; }
            50% { opacity: 1; }
        }

        h1 { color: #2c3e50; margin-bottom: 5px; text-align: center; }
        p.subtitle { color: #7f8c8d; margin-top: 0; margin-bottom: 25px; text-align: center;}

        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1150px;
            min-height: 650px;
        }

        .left-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            max-height: 750px;
        }

        .input-group {
            background: #f1f8ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #cce5ff;
        }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #0056b3; }
        select, input[type="text"] { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #b8daff; border-radius: 4px; box-sizing: border-box; font-family: monospace; font-size: 14px; }
        .btn-apply { width: 100%; background-color: #0056b3; color: white; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-apply:hover { background-color: #004494; }

        .word-list { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; min-height: 100px; }
        .word-item { font-size: 20px; font-family: 'Courier New', Courier, monospace; font-weight: bold; padding: 6px 10px; margin: 4px 0; border-radius: 6px; background: #f8f9fa; border-left: 5px solid transparent; transition: all 0.3s ease; letter-spacing: 2px; }
        .word-item.comparing { background: #e3f2fd; border-left-color: #2196f3; transform: scale(1.02); }
        .char-span { display: inline-block; padding: 0 2px; transition: all 0.3s; }
        .char-span.mismatch { background-color: #ffeb3b; color: #d32f2f; border-radius: 4px; font-weight: 900; }

        /* New Result Bucket Styles */
        .result-box {
            background: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; margin-bottom: 15px;
        }
        .result-box label { display: block; font-weight: bold; font-size: 14px; color: #2e7d32; margin-bottom: 5px; }
        .result-array { font-size: 22px; font-family: monospace; font-weight: bold; letter-spacing: 4px; color: #1b5e20; min-height: 30px;}

        .controls { display: flex; gap: 10px; margin-top: auto; }
        .controls button { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        #nextBtn { background-color: #2196f3; color: white; }
        #nextBtn:hover { background-color: #0b7dda; }
        #nextBtn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #resetBtn { background-color: #e0e0e0; color: #333; }
        #resetBtn:hover { background-color: #d5d5d5; }

        .right-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .explanation-box { background: #f1f8ff; border-left: 4px solid #2196f3; padding: 15px; border-radius: 4px; min-height: 60px; margin-bottom: 20px; font-size: 16px; line-height: 1.5; transition: all 0.3s;}
        .explanation-box.error { background: #ffebee; border-left-color: #f44336; }
        .explanation-box.success { background: #e8f5e9; border-left-color: #4caf50; }

        #graph-container {
            flex-grow: 1;
            min-height: 450px;
            border: 1px solid rgba(141, 207, 148, 0.72);
            border-radius: 8px;
            position: relative;
            background: rgba(247, 255, 247, 0.76);
            backdrop-filter: blur(2px);
            overflow: hidden;
        }
        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* DFS Node States */
        .node circle { stroke: #5f9d68; stroke-width: 3px; fill: #f7fff7; transition: fill 0.4s, stroke 0.4s, r 0.3s; cursor: grab; }
        .node circle:active { cursor: grabbing; }
        .node text { font-size: 18px; font-weight: bold; font-family: sans-serif; pointer-events: none; fill: #17421c; }
        
        .node.active-node circle { fill: #dcf9df; stroke: #2d8a3d; r: 25;}
        .node.visiting circle { fill: #dff7c7; stroke: #79b83d; } /* Yellow-green */
        .node.visited circle { fill: #bce9c0; stroke: #3f8f4f; } /* Green */
        .node.error circle { fill: #b8f0b8; stroke: #2f7d32; r: 28; } /* Green alert */

        .link { fill: none; stroke: #7db389; stroke-width: 3px; transition: stroke 0.3s, stroke-width 0.3s; }
        .link.active-link { stroke: #3d9b4a; stroke-width: 5px; }
        
    </style>
</head>
<body>

    <h1>Complete Alien Dictionary Visualizer</h1>
    <p class="subtitle">Includes Step 1 & 2 (Graph Building) and Step 3 (DFS Topological Sort).</p>

    <div class="container">
        <div class="left-panel">
            <div class="input-group">
                <label for="presetSelect">Try a Preset Scenario:</label>
                <select id="presetSelect" onchange="handlePresetChange()">
                    <option value="standard">Standard (Valid Alphabet)</option>
                    <option value="invalidPrefix">Invalid Prefix (Broken Rules)</option>
                    <option value="cycle">Circular Dependency (Logic Loop)</option>
                    <option value="animals">Animals (Custom Alphabet)</option>
                </select>

                <label for="customWords" style="margin-top: 10px;">Or Type Custom Words:</label>
                <input type="text" id="customWords" placeholder="e.g., z, x, z">
                <button class="btn-apply" onclick="applyCustomWords()">Apply & Restart</button>
            </div>

            <div id="wordListContainer" class="word-list"></div>
            
            <div class="result-box">
                <label>DFS Output Array (Reversed at end):</label>
                <div id="resultArray" class="result-array">[]</div>
            </div>

            <div class="controls">
                <button id="resetBtn" onclick="resetVisualizer()">Restart Run</button>
                <button id="nextBtn" onclick="nextStep()">Next Step</button>
            </div>
        </div>

        <div class="right-panel">
            <div id="explanation" class="explanation-box">Loading...</div>
            <div id="graph-container">
                <svg id="graphSvg"></svg>
            </div>
        </div>
    </div>

    <div class="page-background" aria-hidden="true">
        <div class="backdrop-grid"></div>

        <div class="floating-figure spock">
            <img src="439-4391324_star-trek-transparent-background-star-trek-logo-transparent-removebg-preview.png" alt="Star Trek inspired image">
        </div>

        <div class="floating-figure spock alt">
            <img src="439-4391324_star-trek-transparent-background-star-trek-logo-transparent-removebg-preview.png" alt="Star Trek inspired image">
        </div>

        <div class="floating-figure stitch">
            <img src="3869790-middle-removebg-preview.png" alt="Stitch inspired image">
        </div>

        <div class="floating-figure stitch alt">
            <img src="3869790-middle-removebg-preview.png" alt="Stitch inspired image">
        </div>

        <div class="floating-figure alien">
            <img src="disney-toy-story-allen-emoji-png-clipart-removebg-preview.png" alt="Toy Story alien inspired image">
        </div>

        <div class="floating-figure alien alt">
            <img src="disney-toy-story-allen-emoji-png-clipart-removebg-preview.png" alt="Toy Story alien inspired image">
        </div>
    </div>

    <script>
        const presets = {
            "standard": "wrt, wrf, er, ett, rftt",
            "invalidPrefix": "abc, ab", 
            "cycle": "z, x, z", 
            "animals": "dog, deer, cat, cow, bat"
        };

        let currentWords = [];
        let generatedSteps = [];
        let currentStepIdx = -1;
        let graphNodes = [];
        let graphLinks = []; 
        let currentResultArray = [];
        
        let svg, simulation, linksGroup, nodesGroup;
        const width = 750, height = 500;
        const radius = 22;

        window.onload = function() {
            document.getElementById("customWords").value = presets["standard"];
            initD3Graph();
            applyCustomWords();
        };

        function calculateAlgorithmSteps() {
            generatedSteps = [];
            currentResultArray = [];
            let adj = {}; // Adjacency List for Step 3
            
            // --- STEP 1: Init ---
            const chars = new Set();
            currentWords.forEach(w => w.split('').forEach(c => chars.add(c)));
            const uniqueChars = Array.from(chars);
            uniqueChars.forEach(c => adj[c] = new Set());

            generatedSteps.push({
                type: "init",
                text: `<b>Step 1: Initialize Graph</b><br>Extract unique letters: <b>${uniqueChars.join(', ')}</b>.`,
                nodes: uniqueChars
            });

            // --- STEP 2: Compare ---
            let isInvalid = false;
            for (let i = 0; i < currentWords.length - 1; i++) {
                let w1 = currentWords[i];
                let w2 = currentWords[i+1];
                let minLen = Math.min(w1.length, w2.length);
                let mismatchFound = false;

                if (w1.length > w2.length && w1.substring(0, minLen) === w2.substring(0, minLen)) {
                    generatedSteps.push({
                        type: "invalid", pair: [i, i+1],
                        text: `<b>Comparing '${w1}' & '${w2}':</b><br><b>ERROR!</b> Invalid prefix rule. Halting.`
                    });
                    isInvalid = true;
                    break; 
                }

                for (let j = 0; j < minLen; j++) {
                    if (w1[j] !== w2[j]) {
                        adj[w1[j]].add(w2[j]); // Add to true Adjacency List
                        generatedSteps.push({
                            type: "compare", pair: [i, i+1], mismatchIdx: j, edge: { source: w1[j], target: w2[j] },
                            text: `<b>Comparing '${w1}' & '${w2}':</b><br>Mismatch at <b>${w1[j]}</b> vs <b>${w2[j]}</b>. Rule: <b>${w1[j]}</b> $\\rightarrow$ <b>${w2[j]}</b>.`
                        });
                        mismatchFound = true;
                        break;
                    }
                }
                if (!mismatchFound) {
                    generatedSteps.push({ type: "match", pair: [i, i+1], text: `No mismatches in prefix.`});
                }
            }

            if (isInvalid) return;

            generatedSteps.push({ type: "transition", text: `<b>Step 2 Complete!</b><br>Graph is built. Now starting <b>Step 3: DFS Topological Sort</b>.` });

            // --- STEP 3: DFS Topological Sort ---
            let visited = {}; 
            let res = [];
            let hasCycle = false;

            function dfs(c) {
                if (visited.hasOwnProperty(c)) {
                    if (visited[c] === true) {
                        generatedSteps.push({ type: "dfs_cycle", node: c, text: `<b>DFS Error:</b> Reached node <b>${c}</b> which is already active (YELLOW). This means there is a <b>Circular Dependency (Cycle)</b>! The alphabet is invalid.` });
                        hasCycle = true;
                        return true;
                    }
                    return false; // Already processed (Green), safely ignore.
                }

                visited[c] = true;
                generatedSteps.push({ type: "dfs_visit", node: c, text: `<b>DFS:</b> Exploring node <b>${c}</b>. Marking as <span style="background: #fff59d; padding:2px 6px; border-radius:4px;">Visiting (Yellow)</span>.` });

                for (let neighbor of Array.from(adj[c])) {
                    generatedSteps.push({ type: "dfs_check", source: c, target: neighbor, text: `<b>DFS:</b> Node <b>${c}</b> requires <b>${neighbor}</b> to be processed first. Following arrow...` });
                    if (dfs(neighbor)) return true;
                }

                visited[c] = false;
                res.push(c);
                generatedSteps.push({ type: "dfs_done", node: c, resArray: [...res], text: `<b>DFS:</b> Node <b>${c}</b> has no more unchecked dependencies. Marking as <span style="background: #c8e6c9; padding:2px 6px; border-radius:4px;">Safe (Green)</span> and pushing to bucket.` });
                return false;
            }

            // Run DFS for all nodes
            for (let c of uniqueChars) {
                if (hasCycle) break;
                if (!visited.hasOwnProperty(c)) {
                    dfs(c);
                }
            }

            if (!hasCycle) {
                let finalStr = [...res].reverse().join('');
                generatedSteps.push({ type: "done", finalStr: finalStr, resArray: [...res].reverse(), text: `<b>DFS Complete!</b><br>Finally, we <b>reverse</b> the bucket list to get the true chronological alphabet order: <b>"${finalStr}"</b>.` });
            }
        }

        // --- UI & Controls ---
        function handlePresetChange() {
            document.getElementById("customWords").value = presets[document.getElementById("presetSelect").value];
            applyCustomWords();
        }

        function applyCustomWords() {
            const rawText = document.getElementById("customWords").value;
            currentWords = rawText.split(',').map(w => w.trim().toLowerCase().replace(/[^a-z]/g, '')).filter(w => w.length > 0);
            if (currentWords.length < 2) return alert("Need at least 2 words.");
            
            renderWordList();
            calculateAlgorithmSteps();
            resetVisualizer();
        }

        function renderWordList() {
            const container = document.getElementById("wordListContainer");
            container.innerHTML = "";
            currentWords.forEach((word, wordIdx) => {
                const div = document.createElement("div"); div.className = "word-item"; div.id = `word-${wordIdx}`;
                word.split("").forEach((char, charIdx) => {
                    const span = document.createElement("span"); span.className = `char-span char-idx-${charIdx}`; span.innerText = char;
                    div.appendChild(span);
                });
                container.appendChild(div);
            });
        }

        function resetVisualizer() {
            currentStepIdx = -1;
            graphNodes = []; graphLinks = []; currentResultArray = [];
            
            document.getElementById("nextBtn").disabled = false;
            document.getElementById("explanation").className = "explanation-box";
            document.getElementById("resultArray").innerText = "[]";
            
            clearHighlights();
            updateGraphVisuals();
            nextStep(); // Auto-init
        }

        function clearHighlights() {
            d3.selectAll(".word-item").classed("comparing", false);
            d3.selectAll(".char-span").classed("mismatch", false);
            d3.selectAll(".node").classed("active-node", false);
            d3.selectAll(".link").classed("active-link", false);
        }

        function nextStep() {
            currentStepIdx++;
            if (currentStepIdx >= generatedSteps.length) return;

            const step = generatedSteps[currentStepIdx];
            const expBox = document.getElementById("explanation");
            expBox.innerHTML = step.text;
            expBox.className = "explanation-box"; 

            clearHighlights();

            if (step.type === "init") {
                graphNodes = step.nodes.map(c => ({ id: c, x: width/2 + (Math.random()-0.5)*100, y: height/2 + (Math.random()-0.5)*100, state: 'default' }));
                updateGraphVisuals();
            } 
            else if (step.type === "compare") {
                document.getElementById(`word-${step.pair[0]}`).classList.add("comparing");
                document.getElementById(`word-${step.pair[1]}`).classList.add("comparing");
                document.querySelector(`#word-${step.pair[0]} .char-idx-${step.mismatchIdx}`).classList.add("mismatch");
                document.querySelector(`#word-${step.pair[1]} .char-idx-${step.mismatchIdx}`).classList.add("mismatch");

                if (!graphLinks.some(l => (l.source.id || l.source) === step.edge.source && (l.target.id || l.target) === step.edge.target)) {
                    graphLinks.push({ source: step.edge.source, target: step.edge.target });
                    updateGraphVisuals();
                }

                svg.selectAll(".node").filter(d => d.id === step.edge.source || d.id === step.edge.target).classed("active-node", true);
            } 
            else if (step.type === "match") {
                document.getElementById(`word-${step.pair[0]}`).classList.add("comparing");
                document.getElementById(`word-${step.pair[1]}`).classList.add("comparing");
            }
            else if (step.type === "invalid") {
                expBox.classList.add("error");
                document.getElementById("nextBtn").disabled = true;
            }
            // DFS Visualization Steps
            else if (step.type === "dfs_visit") {
                let node = graphNodes.find(n => n.id === step.node);
                if(node) node.state = 'visiting';
                updateGraphVisuals();
            }
            else if (step.type === "dfs_check") {
                svg.selectAll(".link").filter(l => (l.source.id === step.source && l.target.id === step.target)).classed("active-link", true);
            }
            else if (step.type === "dfs_done") {
                let node = graphNodes.find(n => n.id === step.node);
                if(node) node.state = 'visited';
                document.getElementById("resultArray").innerText = "[ " + step.resArray.join(", ") + " ]";
                updateGraphVisuals();
            }
            else if (step.type === "dfs_cycle") {
                let node = graphNodes.find(n => n.id === step.node);
                if(node) node.state = 'error';
                expBox.classList.add("error");
                updateGraphVisuals();
                document.getElementById("nextBtn").disabled = true;
            }
            else if (step.type === "done") {
                expBox.classList.add("success");
                document.getElementById("resultArray").innerHTML = `<span style="color: #d32f2f">REVERSED:</span> [ ${step.resArray.join(", ")} ] $\\rightarrow$ <b>"${step.finalStr}"</b>`;
                document.getElementById("nextBtn").disabled = true;
            }
        }

        // --- D3 Graph Engine ---
        function initD3Graph() {
            svg = d3.select("#graphSvg").attr("viewBox", `0 0 ${width} ${height}`).attr("preserveAspectRatio", "xMidYMid meet");
            svg.selectAll("*").remove();

            svg.append("defs").append("marker")
                .attr("id", "arrow").attr("viewBox", "0 -5 10 10")
                .attr("refX", 28).attr("refY", 0).attr("markerWidth", 7).attr("markerHeight", 7).attr("orient", "auto")
                .append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#95a5a6");

            linksGroup = svg.append("g").attr("class", "links-layer");
            nodesGroup = svg.append("g").attr("class", "nodes-layer");

            simulation = d3.forceSimulation()
                .force("link", d3.forceLink().id(d => d.id).distance(120))
                .force("charge", d3.forceManyBody().strength(-400))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(radius + 20));
        }

        function updateGraphVisuals() {
            if (!svg) return;

            let link = linksGroup.selectAll(".link").data(graphLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
            link.exit().remove();
            let linkEnter = link.enter().append("path").attr("class", "link").attr("marker-end", "url(#arrow)");
            link = linkEnter.merge(link);

            let node = nodesGroup.selectAll(".node").data(graphNodes, d => d.id);
            node.exit().remove();
            let nodeEnter = node.enter().append("g").attr("class", "node")
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));
            
            nodeEnter.append("circle").attr("r", radius);
            nodeEnter.append("text").attr("dy", ".35em").attr("text-anchor", "middle").text(d => d.id);
            
            node = nodeEnter.merge(node);

            // Apply DFS state classes dynamically
            node.attr("class", d => `node ${d.state === 'visiting' ? 'visiting' : d.state === 'visited' ? 'visited' : d.state === 'error' ? 'error' : ''}`);

            simulation.nodes(graphNodes);
            simulation.force("link").links(graphLinks);
            simulation.alpha(1).restart();

            simulation.on("tick", () => {
                graphNodes.forEach(d => {
                    d.x = Math.max(radius + 15, Math.min(width - radius - 15, d.x));
                    d.y = Math.max(radius + 15, Math.min(height - radius - 15, d.y));
                });
                link.attr("d", d => {
                    // Calculate precise edge geometry so arrow touches the edge of the circle
                    let dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    let dr = Math.sqrt(dx * dx + dy * dy);
                    return `M${d.source.x},${d.source.y}L${d.target.x},${d.target.y}`;
                });
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(event, d) { d.fx = Math.max(radius+15, Math.min(width-radius-15, event.x)); d.fy = Math.max(radius+15, Math.min(height-radius-15, event.y)); }
        function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
    </script>
</body>
</html>
